<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Røysumtunet - Strategisk IKT-plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        const OnboardingApp = () => {
          const [activeStep, setActiveStep] = useState(0);

          const steps = [
            {
              id: "kartlegging",
              title: "1. Kartlegging",
              subtitle: "Forståelse av hverdagen",
              icon: "🔍",
              gap: "Onboarding og grunnopplæring",
              consequence: "Nye ansatte må vente på tilganger, og Martin bruker mye tid på manuell punching i flere systemer uten en fast sjekkliste.",
              approach: "Jeg setter meg ned med HR og Martin for å tegne opp den faktiske veien en ny ansatt går fra signert kontrakt til ferdig oppsett PC. Vi identifiserer hvor informasjonen stopper opp.",
              tools: "Visma HRM og eksisterende sjekklister.",
              leadership: "Lytte til de som står i støyen, fjerne antagelser og skape et felles bilde av hvor skoen trykker."
            },
            {
              id: "rutiner",
              title: "2. Rutiner for dokumentasjon",
              subtitle: "Trygghet og sporbarhet",
              icon: "📝",
              gap: "PlusOffice som sårbarhet / Manuell compliance",
              consequence: "Viktig dokumentasjon er personavhengig eller låst i enkeltsystemer som PlusOffice. Ved tilsyn må vi 'lete' etter bevis på at vi følger loven.",
              approach: "Jeg flytter fokuset fra 'arkivering' til 'løpende dokumentasjon'. Vi definerer faste eiere av data i linjen og sørger for at logger skjer automatisk som en del av arbeidet, ikke som en ekstraoppgave.",
              tools: "SharePoint og M365 (eksisterende lisenser).",
              leadership: "Sikre at alle forstår sitt ansvar for data. Jeg rydder i uklare ansvarsforhold mellom IKT og avdelingene."
            },
            {
              id: "effektivisering",
              title: "3. Modernisering",
              subtitle: "Enklere hverdag for ansatte",
              icon: "⚡",
              gap: "Flere innlogginger og brukernavn",
              consequence: "Ansatte glemmer passord, bruker tid på feilmeldinger og IKT-støtte blir overveldet av enkle henvendelser.",
              approach: "Vi rydder i 'nøkleknippet'. Jeg prioriterer arbeidet med å koble fagsystemene sammen slik at én pålogging er nok. Dette er ikke et IT-prosjekt, men et tiltak for å gi tid tilbake til pleie.",
              tools: "Microsoft Entra ID (allerede tilgjengelig).",
              leadership: "Fjerne friksjon i de ansattes arbeidsverktøy. Vise at IKT er til for å forenkle, ikke komplisere."
            },
            {
              id: "okonomi",
              title: "4. Økonomisk styring",
              subtitle: "Forutsigbarhet og kontroll",
              icon: "💰",
              gap: "Manglende oversikt over ressursbruk",
              consequence: "Vi betaler for lisenser som ikke brukes, og maskinvare kjøpes inn ad-hoc uten en langsiktig plan for utskifting.",
              approach: "Jeg kobler IKT-kostnadene direkte til personallisten. Når noen slutter, stopper kostnaden. Vi lager en 3-årig plan for utstyr slik at styret vet nøyaktig hva som kommer av utgifter.",
              tools: "Budsjettkontroll i samspill med HR-data.",
              leadership: "Skape forutsigbarhet for Adm.dir og styret. Vise at hver krone brukt på IKT er en investering i driftssikkerhet."
            },
            {
              id: "lederskap",
              title: "5. Bruk av lederskap",
              subtitle: "Brobygger og lagspiller",
              icon: "🤝",
              gap: "Risiko-, avviks- og kontrollsløyfen",
              consequence: "IKT blir sittende på siden av kjernevirksomheten. Tekniske svakheter blir ikke fanget opp før de blir kritiske feil.",
              approach: "Jeg tar plassen som bindeleddet mellom Martins tekniske innsikt og ledelsens behov for kontroll. Jeg oversetter teknisk risiko til virksomhetsrisiko som styret kan forholde seg til.",
              tools: "Månedsrapportering og risiko-oversikter.",
              leadership: "Bygge stolthet hos Martin, trygghet hos Adm.dir og forståelse hos avdelingslederne. Jeg leder gjennom tilstedeværelse i driften."
            }
          ];

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 p-6 md:p-12">
              <header className="max-w-5xl mx-auto mb-12 border-b border-slate-200 pb-8">
                <div className="flex items-center gap-3 mb-2">
                  <div className="bg-slate-900 text-white px-3 py-1 rounded font-bold text-sm">V9</div>
                  <h1 className="text-2xl font-black uppercase tracking-tight">Røysumtunet</h1>
                </div>
                <h2 className="text-4xl font-light text-slate-600">Strategisk arbeidsplan for ny IKT-sjef</h2>
                <p className="mt-4 text-slate-500 max-w-2xl font-medium">
                  En jordnær tilnærming for å tette gapene og skape en forutsigbar driftshverdag.
                </p>
              </header>

              <main className="max-w-5xl mx-auto grid lg:grid-cols-12 gap-8">
                {/* Navigasjon */}
                <nav className="lg:col-span-4 space-y-3">
                  {steps.map((step, index) => (
                    <button
                      key={step.id}
                      onClick={() => setActiveStep(index)}
                      className={`w-full text-left p-5 rounded-2xl transition-all border-2 ${
                        activeStep === index 
                        ? 'bg-white border-blue-500 shadow-lg translate-x-2' 
                        : 'bg-white/50 border-transparent hover:border-slate-200 text-slate-500'
                      }`}
                    >
                      <div className="flex items-center gap-4">
                        <span className="text-3xl">{step.icon}</span>
                        <div>
                          <div className={`text-[10px] font-black uppercase tracking-widest ${activeStep === index ? 'text-blue-600' : 'text-slate-400'}`}>
                            Fokusområde
                          </div>
                          <div className="font-bold text-lg leading-tight">{step.title}</div>
                        </div>
                      </div>
                    </button>
                  ))}
                </nav>

                {/* Innhold */}
                <section className="lg:col-span-8">
                  <AnimatePresence mode="wait">
                    <motion.div
                      key={activeStep}
                      initial={{ opacity: 0, y: 20 }}
                      animate={{ opacity: 1, y: 0 }}
                      exit={{ opacity: 0, y: -20 }}
                      transition={{ duration: 0.2 }}
                      className="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-slate-200 h-full"
                    >
                      <div className="mb-10">
                        <span className="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">
                          {steps[activeStep].subtitle}
                        </span>
                        <h2 className="text-4xl font-black text-slate-900 mt-4 tracking-tight">
                          {steps[activeStep].title.split('. ')[1]}
                        </h2>
                      </div>

                      <div className="grid md:grid-cols-2 gap-10">
                        <div className="space-y-8">
                          <div>
                            <h4 className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                              <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> 
                              Gap adressert (Adm.dir)
                            </h4>
                            <p className="text-slate-900 font-extrabold text-lg leading-tight">
                              {steps[activeStep].gap}
                            </p>
                          </div>

                          <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">
                              Konsekvens for driften
                            </h4>
                            <p className="text-slate-600 text-sm leading-relaxed">
                              {steps[activeStep].consequence}
                            </p>
                          </div>
                        </div>

                        <div className="flex flex-col gap-6">
                          <div className="bg-blue-600 text-white p-8 rounded-[2rem] shadow-xl relative overflow-hidden group">
                            <div className="absolute -right-4 -top-4 text-8xl opacity-10 group-hover:scale-110 transition-transform">
                              {steps[activeStep].icon}
                            </div>
                            <h4 className="text-[10px] font-black text-blue-200 uppercase tracking-widest mb-4 relative z-10">
                              Min arbeidsform som IKT-sjef
                            </h4>
                            <p className="text-lg font-medium leading-relaxed relative z-10 italic">
                              "{steps[activeStep].approach}"
                            </p>
                          </div>

                          <div className="grid grid-cols-2 gap-4">
                            <div className="p-4 bg-white border border-slate-200 rounded-2xl">
                              <h4 className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Verktøy</h4>
                              <p className="text-xs font-bold text-slate-700">{steps[activeStep].tools}</p>
                            </div>
                            <div className="p-4 bg-white border border-slate-200 rounded-2xl">
                              <h4 className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Ledergrep</h4>
                              <p className="text-xs font-bold text-slate-700">{steps[activeStep].leadership}</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </motion.div>
                  </AnimatePresence>
                </section>
              </main>

              <footer className="max-w-5xl mx-auto mt-12 pt-8 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center gap-6">
                <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                  Røysumtunet | Strategisk og operasjonell IKT-ledelse
                </div>
                <div className="flex gap-8">
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 bg-blue-500 rounded-full"></div>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Trygghet</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 bg-emerald-500 rounded-full"></div>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Forutsigbarhet</span>
                  </div>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OnboardingApp />);
    </script>
</body>
</html>
