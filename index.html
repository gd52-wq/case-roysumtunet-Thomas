<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Røysumtunet - Lederdashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Dashboard = () => {
            const [currentTime, setCurrentTime] = useState("");
            const [activeTab, setActiveTab] = useState("onboarding");

            useEffect(() => {
                const date = new Date();
                setCurrentTime(date.toLocaleDateString('no-NO', { day: 'numeric', month: 'long', year: 'numeric' }));
            }, []);

            // Mock-data for onboardingsprosesser
            const onboardings = [
                { 
                    navn: "Kari Nordmann", 
                    rolle: "Sykepleier", 
                    avdeling: "Rehabilitering",
                    status: "Fullført",
                    progress: 100,
                    steg: { hr: true, ikt: true, utstyr: true, opplaering: true }
                },
                { 
                    navn: "Ola Hadeland", 
                    rolle: "Helsefagarbeider", 
                    avdeling: "Bo- og bistand",
                    status: "Venter på IKT",
                    progress: 50,
                    steg: { hr: true, ikt: false, utstyr: false, opplaering: false },
                    alert: "Mangler Entra ID lisens"
                },
                { 
                    navn: "Siri Jaren", 
                    rolle: "Miljøterapeut", 
                    avdeling: "ME-omsorg",
                    status: "Signert kontrakt",
                    progress: 25,
                    steg: { hr: true, ikt: false, utstyr: false, opplaering: false }
                }
            ];

            // Mock-data for Avvik og Risiko
            const avviksData = [
                {
                    id: "AV-26-042",
                    kategori: "Informasjonssikkerhet",
                    beskrivelse: "Uautorisert enhet oppdaget på internt nettverk",
                    eier: "Martin (IKT)",
                    kritikalitet: "Høy",
                    progress: 75,
                    steg: { registrert: true, evaluert: true, tiltak: true, lukket: false },
                    revisjonsspor: "Loggført i Defender. Venter på sluttrapport i SharePoint.",
                    alert: "Krever signatur fra Adm.dir"
                },
                {
                    id: "AV-26-041",
                    kategori: "Drift/System",
                    beskrivelse: "Kortvarig utfall av ASCOM sykesignal avd. Vest",
                    eier: "Martin/ny ressurs (IKT)",
                    kritikalitet: "Kritisk",
                    progress: 100,
                    steg: { registrert: true, evaluert: true, tiltak: true, lukket: true },
                    revisjonsspor: "Rotårsaksanalyse lagret i SharePoint.",
                    alert: null
                },
                {
                    id: "AV-26-043",
                    kategori: "HMS / Rutine",
                    beskrivelse: "Manglende dokumentasjon på brannøvelse",
                    eier: "Avdelingsleder",
                    kritikalitet: "Medium",
                    progress: 25,
                    steg: { registrert: true, evaluert: false, tiltak: false, lukket: false },
                    revisjonsspor: "Opprettet via Teams-skjema. Venter på leder.",
                    alert: "Oversittet frist (48t)"
                }
            ];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-red-800 rounded-lg flex items-center justify-center text-white font-bold text-xl">R</div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-900">Ledelsens Beslutningsgrunnlag</h1>
                                    <p className="text-sm text-slate-500">
                                        Data hentet direkte fra Microsoft 365, Entra ID og Visma
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div className="text-right hidden md:block">
                            <p className="text-sm font-medium text-slate-500">Status per</p>
                            <p className="text-lg font-bold text-slate-800">{currentTime}</p>
                        </div>
                    </header>

                    {/* Fane-navigasjon */}
                    <div className="max-w-6xl mx-auto flex gap-2 mb-6 bg-slate-200/50 p-1 rounded-xl w-fit">
                        <button 
                            onClick={() => setActiveTab("onboarding")}
                            className={`px-6 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === "onboarding" ? "bg-white text-slate-900 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}
                        >
                            Onboarding (HR & IKT)
                        </button>
                        <button 
                            onClick={() => setActiveTab("avvik")}
                            className={`px-6 py-2.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === "avvik" ? "bg-white text-slate-900 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}
                        >
                            Avvik, Risiko & Kontrollsløyfen
                            {activeTab !== "avvik" && <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>}
                        </button>
                    </div>

                    {activeTab === "onboarding" && (
                        <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                            {/* KPI Cards Onboarding */}
                            <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Aktive onboardinger</h3>
                                    <div className="text-4xl font-black text-slate-800">3</div>
                                    <p className="text-sm text-emerald-600 font-medium mt-2">Alle registrert i Visma HRM</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-orange-500">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">IT-tilganger mangler</h3>
                                    <div className="text-4xl font-black text-slate-800">2</div>
                                    <p className="text-sm text-orange-600 font-medium mt-2">Flaskehals identifisert i prosess</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Compliance Score (Opplæring)</h3>
                                    <div className="text-4xl font-black text-slate-800">92%</div>
                                    <p className="text-sm text-slate-500 font-medium mt-2">Siste 30 dager</p>
                                </div>
                            </div>

                            {/* Main Content Onboarding */}
                            <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-lg font-bold text-slate-800">Sanntids oversikt: Nye ansatte</h2>
                                    <span className="bg-emerald-100 text-emerald-800 text-xs px-3 py-1 rounded-full font-bold">Live Data</span>
                                </div>
                                
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-white border-b border-slate-100">
                                                <th className="p-4 text-sm font-bold text-slate-500">Ansatt</th>
                                                <th className="p-4 text-sm font-bold text-slate-500">Rolle / Avdeling</th>
                                                <th className="p-4 text-sm font-bold text-slate-500 w-1/3">Prosess-status (Visma -> Entra -> Bygg)</th>
                                                <th className="p-4 text-sm font-bold text-slate-500">Systemvarsler</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {onboardings.map((person, idx) => (
                                                <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-900">{person.navn}</div>
                                                        <div className="text-xs text-slate-500">{person.status}</div>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="font-medium text-slate-800">{person.rolle}</div>
                                                        <div className="text-xs text-slate-500">{person.avdeling}</div>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <div className="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden flex">
                                                                <div className={`h-full ${person.progress === 100 ? 'bg-emerald-500' : 'bg-blue-500'}`} style={{width: `${person.progress}%`}}></div>
                                                            </div>
                                                            <span className="text-xs font-bold text-slate-600 w-8 text-right">{person.progress}%</span>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <span className={`text-[10px] px-2 py-1 rounded ${person.steg.hr ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>1. Kontrakt</span>
                                                            <span className={`text-[10px] px-2 py-1 rounded ${person.steg.ikt ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>2. IKT Tilgang</span>
                                                            <span className={`text-[10px] px-2 py-1 rounded ${person.steg.utstyr ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>3. Utstyr</span>
                                                            <span className={`text-[10px] px-2 py-1 rounded ${person.steg.opplaering ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>4. Opplæring</span>
                                                        </div>
                                                    </td>
                                                    <td className="p-4">
                                                        {person.alert ? (
                                                            <span className="inline-flex items-center gap-1 bg-orange-50 text-orange-700 text-xs px-2 py-1 rounded border border-orange-200">
                                                                <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                                                {person.alert}
                                                            </span>
                                                        ) : (
                                                            <span className="text-xs text-slate-400">-</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === "avvik" && (
                        <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                            {/* KPI Cards Avvik & Risiko */}
                            <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-red-500">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Åpne avvik u/tiltak</h3>
                                    <div className="text-4xl font-black text-slate-800">1</div>
                                    <p className="text-sm text-red-600 font-medium mt-2">Venter på evaluering</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Tiltak under arbeid</h3>
                                    <div className="text-4xl font-black text-slate-800">1</div>
                                    <p className="text-sm text-blue-600 font-medium mt-2">Prosessering pågår</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Dokumentert / Lukket</h3>
                                    <div className="text-4xl font-black text-slate-800">14</div>
                                    <p className="text-sm text-slate-500 font-medium mt-2">Siste 30 dager (M365 Audit)</p>
                                </div>
                            </div>

                            {/* Main Content Avvik */}
                            <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-lg font-bold text-slate-800">Kontrollsløyfen: Løpende tiltak og revisjonsspor</h2>
                                    <span className="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-bold border border-blue-200 flex items-center gap-1">
                                        <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                        ITIL Light integrert
                                    </span>
                                </div>
                                
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-white border-b border-slate-100">
                                                <th className="p-4 text-sm font-bold text-slate-500">ID / Kategori</th>
                                                <th className="p-4 text-sm font-bold text-slate-500">Beskrivelse & Eier</th>
                                                <th className="p-4 text-sm font-bold text-slate-500 w-1/3">Prosessteg (Planlegge - Gjøre - Evaluere - Korrigere)</th>
                                                <th className="p-4 text-sm font-bold text-slate-500">Revisjonsspor (Compliance)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {avviksData.map((avvik, idx) => (
                                                <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-900">{avvik.id}</div>
                                                        <div className={`text-xs font-bold mt-1 px-2 py-0.5 rounded inline-block ${avvik.kritikalitet === 'Kritisk' ? 'bg-red-100 text-red-700' : avvik.kritikalitet === 'Høy' ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-600'}`}>
                                                            {avvik.kategori}
                                                        </div>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="font-medium text-slate-800">{avvik.beskrivelse}</div>
                                                        <div className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                                            {avvik.eier}
                                                        </div>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <div className="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden flex">
                                                                <div className={`h-full ${avvik.progress === 100 ? 'bg-emerald-500' : avvik.progress > 25 ? 'bg-blue-500' : 'bg-red-500'}`} style={{width: `${avvik.progress}%`}}></div>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <span className={`text-[10px] px-2 py-1 rounded ${avvik.steg.registrert ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-400'}`}>1. Registrert</span>
                                                            <span className={`text-[10px] px-2 py-1 rounded ${avvik.steg.evaluert ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-400'}`}>2. Evaluert</span>
                                                            <span className={`text-[10px] px-2 py-1 rounded ${avvik.steg.tiltak ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-400'}`}>3. Tiltak</span>
                                                            <span className={`text-[10px] px-2 py-1 rounded ${avvik.steg.lukket ? 'bg-emerald-100 text-emerald-800 font-bold' : 'bg-slate-100 text-slate-400'}`}>4. Lukket</span>
                                                        </div>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="text-xs font-medium text-slate-700 flex items-start gap-2">
                                                            <svg className="w-4 h-4 text-emerald-600 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                            {avvik.revisjonsspor}
                                                        </div>
                                                        {avvik.alert && (
                                                            <div className="mt-2 text-[10px] font-bold text-red-600 bg-red-50 px-2 py-1 rounded border border-red-100 inline-block">
                                                                ! {avvik.alert}
                                                            </div>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
