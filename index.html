                                            <button 
                                                onClick={() => setViewMode('technical')} 
                                                className="flex-1 bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-blue-600 shadow-xl transition-all"
                                            >
                                                Se veien til målet →
                                            </button>
                                        </div>
                                    </motion.div>
                                )}

                                {viewMode === 'technical' && (
                                    <motion.div 
                                        key="technical" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }}
                                        className="bg-slate-900 rounded-[3rem] p-12 shadow-2xl border-t-8 border-blue-600 flex-1 flex flex-col relative overflow-hidden"
                                    >
                                        <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#fff 0.5px, transparent 0.5px)', backgroundSize: '40px 40px' }}></div>
                                        <div className="mb-14 relative z-10 flex justify-between items-end">
                                            <div>
                                                <span className="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Praktisk gjennomføring</span>
                                                <h2 className="text-4xl font-black text-white mt-4 tracking-tight">{steps[activeStep].tech.concept}</h2>
                                            </div>
                                            <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest italic">{steps[activeStep].phase}</div>
                                        </div>

                                        <div className="flex-1 flex flex-col md:flex-row items-center justify-center gap-12 relative z-10">
                                            {steps[activeStep].tech.nodes.map((node, ni) => (
                                                <React.Fragment key={ni}>
                                                    <motion.div 
                                                        initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} transition={{ delay: ni * 0.1 }}
                                                        className={`p-10 rounded-[2.5rem] border-2 shadow-2xl w-full md:w-72 text-center group hover:bg-white transition-all duration-500 bg-slate-800 border-slate-700`}
                                                    >
                                                        <div className="text-7xl mb-8 group-hover:scale-110 transition-transform duration-500">{node.icon}</div>
                                                        <div className="font-black text-sm uppercase mb-3 text-white group-hover:text-blue-600 transition-colors tracking-widest">{node.tool}</div>
                                                        <div className="text-[10px] font-bold uppercase tracking-tighter text-slate-400 group-hover:text-slate-600">{node.action}</div>
                                                    </motion.div>
                                                    {ni < steps[activeStep].tech.nodes.length - 1 && <div className="text-blue-600 text-5xl font-black animate-pulse">➔</div>}
                                                </React.Fragment>
                                            ))}
                                        </div>

                                        <div className="mt-14 flex justify-between items-center relative z-10 border-t border-slate-800 pt-10">
                                            <button onClick={() => setViewMode('business')} className="text-slate-500 font-black text-xs uppercase hover:text-white transition-all tracking-widest">← Tilbake til gevinst</button>
                                            <button 
                                                onClick={() => {
                                                    if (activeStep < steps.length - 1) {
                                                        setActiveStep(activeStep + 1);
                                                        setViewMode('mapping');
                                                    }
                                                }}
                                                className="bg-white text-slate-900 px-12 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-xl"
                                            >
                                                Gå til neste steg →
                                            </button>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        {/* Strategisk Sidebar */}
                        <div className="lg:col-span-4 flex flex-col gap-8">
                            
                            {/* Prosessoversikt */}
                            <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-200 flex flex-col h-full max-h-[600px]">
                                <h3 className="text-[10px] font-black text-slate-800 uppercase tracking-[0.3em] mb-10 flex justify-between items-center border-b pb-6">
                                    Vår transformasjon
                                    <span className="flex h-3 w-3 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-blue-600"></span>
                                    </span>
                                </h3>
                                
                                <div className="space-y-4 flex-1 overflow-y-auto thin-scrollbar pr-2">
                                    {steps.map((s, i) => (
                                        <div key={i} className={`flex items-start gap-4 transition-all duration-300 ${i === activeStep ? 'opacity-100' : 'opacity-25 grayscale'}`}>
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs shadow-sm flex-shrink-0 ${i === activeStep ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                {i + 1}
                                            </div>
                                            <div className="min-w-0">
                                                <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate">{s.phase}</div>
                                                <div className="text-xs font-bold text-slate-700 truncate">{s.title}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-8 pt-8 border-t">
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Hvor langt har vi kommet?</div>
                                        <div className="text-xs font-black text-blue-600">{Math.round((activeStep + 1) / steps.length * 100)}%</div>
                                    </div>
                                    <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                                        <motion.div className="h-full bg-blue-600" animate={{ width: `${(activeStep + 1) / steps.length * 100}%` }}></motion.div>
                                    </div>
                                </div>
                            </div>

                            {/* Strategisk Notat */}
                            <div className="bg-slate-900 rounded-[2.5rem] p-10 shadow-2xl border-b-8 border-blue-600">
                                <h4 className="text-blue-400 font-black text-[10px] uppercase tracking-[0.3em] mb-4">💡 Strategisk svar til Adm.dir</h4>
                                <div className="space-y-6">
                                    <div className="p-4 bg-slate-800 rounded-2xl border-l-4 border-blue-500">
                                        <p className="text-[11px] font-bold text-slate-300 leading-relaxed italic">
                                            "Digitalisering er ikke et IT-prosjekt, men et løft for hele Røysumtunet. Ved å bygge en solid plan fjerner vi risiko, sparer tid i hverdagen og sikrer at styrets satsning gir varige resultater for både ansatte og pasienter."
                                        </p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center text-xl shadow-lg">🎯</div>
                                        <div className="text-[10px] font-bold text-slate-400 leading-tight">
                                            Fokus på forutsigbarhet, sikkerhet og en enklere arbeidshverdag.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OnboardingApp />);
    </script>
</body>
</html>
