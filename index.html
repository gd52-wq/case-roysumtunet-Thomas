<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Røysumtunet - Automatisert Compliance-reise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            background-color: #f1f5f9; 
            color: #0f172a; 
        }
        /* Egendefinerte rullefelt (scrollbars) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .thin-scrollbar::-webkit-scrollbar { width: 5px; }
        .thin-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
        .thin-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const OnboardingApp = () => {
            const [activeStep, setActiveStep] = useState(0);
            const [isAutoPlaying, setIsAutoPlaying] = useState(false);
            const [auditTrail, setAuditTrail] = useState([]);
            const [employeeName, setEmployeeName] = useState("Kandidat Nordmann"); 
            const [viewMode, setViewMode] = useState("business"); 
            const autoPlayRef = useRef(null);

            const generateUsername = (name) => {
                return name.toLowerCase().replace(/\s+/g, '.').replace(/[æøå]/g, 'a');
            };

            const steps = [
                {
                    title: "Masterdata",
                    desc: `Vi ser på hvordan HR best kan opprette ${employeeName} direkte i Visma HRM for å trigge IKT-prosessen.`,
                    automation: "Målet er at eksisterende verktøy (f.eks. M365) erstatter manuelle prosesser.",
                    compliance: "Sikrer at data kun legges inn én gang. Færre feilkilder.",
                    icon: "🏢",
                    systems: "Visma HRM / M365 Forms",
                    actionLabel: "Standardiser Inngangsport →",
                    techDetails: {
                        concept: "Utnyttelse av eksisterende M365-lisenser",
                        desc: "I stedet for å kjøpe et nytt bestillingssystem, undersøker vi om vi kan bruke verktøy Røysumtunet allerede har (MS Forms/Power Automate) for å skape en strukturert bestillingsflyt fra leder til HR og IKT.",
                        nodes: [
                            { tool: "MS Forms / PowerApps", action: "Leder fyller ut behov", details: "Utnytter M365 for et standardisert skjema.", icon: "📝", color: "bg-teal-50 border-teal-200 text-teal-800" },
                            { tool: "Power Automate", action: "Databehandling", details: "Behandles via eksisterende løsninger, uten merkostnad.", icon: "⚙️", color: "bg-blue-50 border-blue-200 text-blue-800" },
                            { tool: "HR & Visma", action: "Kvalitetssikring", details: "HR gjør siste sjekk før masterdata opprettes.", icon: "🗄️", color: "bg-indigo-50 border-indigo-200 text-indigo-800" }
                        ]
                    }
                },
                {
                    title: "Digital Kontrakt",
                    desc: `Kartlegge dagens signeringsløsning når ${employeeName} skal signere avtalen.`,
                    automation: "Kan vi integrere dagens BankID-løsning direkte mot personalarkivet?",
                    compliance: "Juridisk bindende signatur som rutes rett til godkjent arkiv.",
                    icon: "✍️",
                    systems: "Eksisterende Signering / Arkiv",
                    actionLabel: "Evaluer Signeringsflyt →",
                    techDetails: {
                        concept: "Sammenkobling av etablerte løsninger",
                        desc: "Mange har digitale kontrakter, men de lastes ofte ned og opp manuelt. Ambisjonen her er å undersøke API-mulighetene i dagens systemer slik at den ferdigsignerte PDF-en flyr automatisk inn i arkivet.",
                        nodes: [
                            { tool: "Visma HRM", action: "Genererer PDF", details: "Lager arbeidsavtale basert på masterdata.", icon: "📄", color: "bg-indigo-50 border-indigo-200 text-indigo-800" },
                            { tool: "Dagens Signering", action: "Autentisering", details: "Gjenbruk av evt. eksisterende BankID-leverandør.", icon: "🔐", color: "bg-blue-50 border-blue-200 text-blue-800" },
                            { tool: "Arkiv API", action: "Automatisert lagring", details: "Målet er at dokumentet rutes inn uten menneskelig klikk.", icon: "📁", color: "bg-emerald-50 border-emerald-200 text-emerald-800" }
                        ]
                    }
                },
                {
                    title: "Rollestyring",
                    desc: `Vi bygger videre på dagens AD-struktur for å gi ${employeeName} riktig tilgang.`,
                    automation: "Målet er å scripte selve brukopprettelsen basert på data fra Visma.",
                    compliance: "Sikrer at ingen får mer tilgang enn stillingen deres krever.",
                    icon: "🔑",
                    systems: "Hybrid AD / Entra ID",
                    actionLabel: "Automatiser AD-konto →",
                    techDetails: {
                        concept: "Videreutvikling av dagens IAM",
                        desc: "Røysumtunet har allerede Hybrid AD og Entra ID. Vi bygger videre på dette gode fundamentet. Ved å skrive PowerShell-scripts som leser Visma-eksporten, fjerner vi behovet for at IKT må punche brukernavn manuelt.",
                        nodes: [
                            { tool: "Visma Eksport", action: "Datauttrekk (CSV)", details: "Sikker overføring av nye profiler automatisk og periodisk.", icon: "📤", color: "bg-indigo-50 border-indigo-200 text-indigo-800" },
                            { tool: "PowerShell", action: "Lokal AD-opprettelse", details: "Skriptet bruker eksisterende OU-er og sikkerhetsgrupper.", icon: "💻", color: "bg-slate-100 border-slate-300 text-slate-800" },
                            { tool: "Entra ID Connect", action: "Dagens Skysynk", details: "Gjenbruk av eksisterende synkronisering til M365.", icon: "☁️", color: "bg-sky-50 border-sky-200 text-sky-800" }
                        ]
                    }
                },
                {
                    title: "Sikker Tilgang",
                    desc: `Riktig M365-lisens og Single Sign-On aktiveres for ${employeeName}.`,
                    automation: "Lisenser deles ut via sikkerhetsgrupper for å optimalisere kostnader.",
                    compliance: "Sikker pålogging uansett hvor brukeren befinner seg.",
                    icon: "🛡️",
                    systems: "M365 / Entra ID SSO",
                    actionLabel: "Optimaliser Lisenser →",
                    techDetails: {
                        concept: "Sikkerhet, SSO og Kostnadskontroll",
                        desc: "Her er det ofte penger å spare. Ved å la Entra ID-grupper styre lisensene, betaler vi aldri for mer enn vi bruker. Samtidig ser vi på om Extensor kan kobles på Entra ID for å gi pleierne Single Sign-On (færre passord).",
                        nodes: [
                            { tool: "Dynamiske Grupper", action: "Tildeler eksakt lisens", details: "Sikrer at vi ikke 'over-lisensierer' ansatte.", icon: "🎫", color: "bg-blue-50 border-blue-200 text-blue-800" },
                            { tool: "Conditional Access", action: "MFA-krav", details: "Tvinger tofaktorpålogging ved behov.", icon: "📱", color: "bg-orange-50 border-orange-200 text-orange-800" },
                            { tool: "SAML/OIDC SSO", action: "Fagsystem-tilgang", details: "Målbilde: Færre innlogginger for pleierne.", icon: "🔑", color: "bg-emerald-50 border-emerald-200 text-emerald-800" }
                        ]
                    }
                },
                {
                    title: "Klientdrift",
                    desc: `Vurdere Intune for PC-klargjøring til ${employeeName}.`,
                    automation: "Kan vi bevege med mot 'Zero-Touch' slik at IKT slipper manuell PC-installasjon?",
                    compliance: "Standardisert oppsett hvor BitLocker-nøkler sikkerhetskopieres automatisk.",
                    icon: "💻",
                    systems: "MS Intune / Autopilot",
                    actionLabel: "Vurder Zero-Touch →",
                    techDetails: {
                        concept: "Modernisering av Klientdriften",
                        desc: "Hvis M365-lisensene allerede inkluderer Intune, bør vi gradvis fase ut manuell installasjon. 'Zero-Touch' lar leverandøren koble PC-en til vår sky, slik at Intune gjør oppsettet automatisk når brukeren logger på.",
                        nodes: [
                            { tool: "Maskin-leverandør", action: "Uploader Hardware Hash", details: "PC-en knyttes til Røysumtunet på fabrikken.", icon: "📦", color: "bg-slate-100 border-slate-300 text-slate-800" },
                            { tool: "Windows Autopilot", action: "Selvbetjent oppsett", details: "Bruker logger på og PC-en setter seg opp selv.", icon: "🌐", color: "bg-blue-50 border-blue-200 text-blue-800" },
                            { tool: "Dagens Intune?", action: "Konfigurasjon", details: "Ruller ut apper og sikrer maskinen uten IKT-inngripen.", icon: "⚙️", color: "bg-purple-50 border-purple-200 text-purple-800" }
                        ]
                    }
                },
                {
                    title: "Kvalitetssikring",
                    desc: `Obligatoriske e-læringskurs fullføres av ${employeeName}.`,
                    automation: "Målbilde: Integrere LMS med Entra ID for automatisk tilgangsjustering.",
                    compliance: "Ledelsen kan bevise overfor tilsyn at opplæring er fullført.",
                    icon: "📖",
                    systems: "Dagens LMS / Entra ID",
                    actionLabel: "Integrer Internkontroll →",
                    techDetails: {
                        concept: "Teknologisk støtte for PDCA-sløyfen",
                        desc: "Vi undersøker om dagens E-læringssystem/LMS har et åpent API. Hvis det har det, kan vi sette opp varslingsregler slik at manglende kurs resulterer i en e-post til leder, i stedet for manuelle sjekker i permer.",
                        nodes: [
                            { tool: "Entra ID", action: "Gruppestyring", details: "Styrer hvilke kurs brukeren er pålagt å ta.", icon: "👥", color: "bg-sky-50 border-sky-200 text-sky-800" },
                            { tool: "Dagens E-læring", action: "Registrerer status", details: "Ansatt gjennomfører kurs digitalt.", icon: "🎓", color: "bg-emerald-50 border-emerald-200 text-emerald-800" },
                            { tool: "Automatisering", action: "Varslingsrutiner", details: "Sender oppsummering til leder ved avvik.", icon: "⚠️", color: "bg-rose-50 border-rose-200 text-rose-800" }
                        ]
                    }
                },
                {
                    title: "Support & ITIL",
                    desc: `For å sikre at ${employeeName} og avdelingene får rask IKT-hjelp, etablerer vi en lokal supportrutine.`,
                    automation: "Enkel skjemautfylling oppretter saken i Teams. Ingen dyre ITSM-systemer kreves.",
                    compliance: "Får kontroll over hvem som har hvilket utstyr via en egen 'CMDB-light'.",
                    icon: "🛠️",
                    systems: "Forms / Planner / SharePoint",
                    actionLabel: "Etabler ITIL-Light →",
                    techDetails: {
                        concept: "Brukervennlig ITIL & CMDB-Light (Røysumtunet-special)",
                        desc: "Vi trenger ikke kjøpe tunge, dyre Helpdesk-systemer fra dag én. Vi kan bygge en skreddersydd og brukervennlig supportportal ved å koble MS Forms mot Teams/Planner. Samtidig oppretter vi en 'CMDB-light' i SharePoint Lists for å ha full kontroll på alt IKT-utstyr.",
                        nodes: [
                            { tool: "MS Forms", action: "Brukervennlig portal", details: "Ansatt melder IKT-behov via et enkelt skjema.", icon: "📝", color: "bg-teal-50 border-teal-200 text-teal-800" },
                            { tool: "Teams & Planner", action: "Sakshåndtering", details: "IKT får saken i et Kanban-brett og kan prioritere arbeidet.", icon: "📋", color: "bg-blue-50 border-blue-200 text-blue-800" },
                            { tool: "SharePoint Lists", action: "CMDB-Light", details: "Database over hvem som eier hvilken PC, lisens og telefon.", icon: "🗄️", color: "bg-indigo-50 border-indigo-200 text-indigo-800" }
                        ]
                    }
                },
                {
                    title: "Konsolidering",
                    desc: `All aktivitet fra ${employeeName} overvåkes av endpoint-sikkerheten.`,
                    automation: "Blokkere skadevare automatisk og samle logger på ett sted.",
                    compliance: "Aktiv overvåkning reduserer risiko for datatap (Extensor).",
                    icon: "🚀",
                    systems: "Sikkerhetsgjennomgang",
                    actionLabel: "Avslutt Onboarding 🏁",
                    techDetails: {
                        concept: "Konsolidering og Rydding (Færre er bedre)",
                        desc: "Røysumtunet bruker Panda 360. Dette er et godt verktøy, men vi bør kartlegge om M365-lisensen deres allerede inkluderer Microsoft Defender for Endpoint. Hvis ja, kan vi konsolidere, spare penger på Panda, og få alt i ett dashboard.",
                        nodes: [
                            { tool: "Sikkerhets-Audit", action: "Kartlegging av EDR", details: "Panda 360 vs. MS Defender (hva betaler vi for?).", icon: "🛡️", color: "bg-red-50 border-red-200 text-red-800" },
                            { tool: "Logganalyse", action: "Samler sikkerhetsdata", details: "Sikre at logger oppbevares iht. helsekrav.", icon: "🔍", color: "bg-blue-50 border-blue-200 text-blue-800" },
                            { tool: "Ledelsens Rapporter", action: "Visuell Status", details: "Gjenbruke Power BI for å vise ledelsen avvik live.", icon: "📈", color: "bg-yellow-50 border-yellow-300 text-yellow-800" }
                        ]
                    }
                }
            ];

            const getDynamicLog = (stepIndex, name) => {
                const logs = [
                    `[KARTLEGGING] Undersøker om M365 kan automatisere HR-mottak for [${name}].`,
                    `[KONTROLL] Ser på API for overføring av signert avtale for [${name}].`,
                    `[MÅLBILDE] Brukerkonto [${generateUsername(name)}] opprettes via Visma-eksport.`,
                    `[OPTIMALISERING] Lisens sjekkes mot behov. MFA og SSO gjøres klart.`,
                    `[MODERNISERING] Vurderer Autopilot for maskinen til [${name}].`,
                    `[ETTERLEVELSE] Status på HMS-kurs for [${name}] logges i systemet.`,
                    `[IT-DRIFT] Røysumtunet-special supportflyt og CMDB-light opprettet i M365.`,
                    `[KONSOLIDERING] Sikkerhetsklient aktiv. Kartlegger muligheter for lisensbesparelse.`
                ];
                return logs[stepIndex];
            };

            useEffect(() => {
                const newLog = getDynamicLog(activeStep, employeeName);
                setAuditTrail(prev => [newLog, ...prev].slice(0, 8));
            }, [activeStep, employeeName]);

            useEffect(() => {
                if (isAutoPlaying && viewMode === 'business') {
                    autoPlayRef.current = setInterval(() => {
                        setActiveStep((prev) => (prev + 1) % steps.length);
                    }, 5000);
                } else {
                    clearInterval(autoPlayRef.current);
                }
                return () => clearInterval(autoPlayRef.current);
            }, [isAutoPlaying, viewMode]);

            const toggleViewMode = () => {
                if (viewMode === 'business') {
                    setViewMode('technical');
                    setIsAutoPlaying(false);
                } else {
                    setViewMode('business');
                }
            };

            return (
                <div className="min-h-screen flex flex-col p-2 md:p-4 overflow-hidden select-none max-w-[1400px] mx-auto relative">
                    
                    <header className="flex flex-col md:flex-row md:justify-between md:items-center mb-4 space-y-3 md:space-y-0">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black tracking-tight text-slate-900 flex items-center">
                                <span className="text-blue-600 mr-2">RØYSUMTUNET</span> 
                                <span className="text-slate-400 font-light">| Konseptuelt Målbilde</span>
                            </h1>
                            <p className="text-slate-600 text-sm mt-1 font-medium">Interaktiv kartlegging (IAM, Automatisering & Gjenbruk)</p>
                        </div>
                        <div className="flex space-x-3 items-center">
                            {/* Input-feltet vises nå i begge moduser, men tilbakeknappen er fjernet herfra */}
                            <div className="flex items-center bg-white p-1.5 px-3 rounded-full border-2 border-slate-300 shadow-sm">
                                <span className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest mr-2">Demo Ansatt:</span>
                                <input 
                                    type="text" 
                                    value={employeeName}
                                    onChange={(e) => setEmployeeName(e.target.value)}
                                    className="bg-transparent text-slate-900 text-sm md:text-base font-bold w-40 md:w-48 focus:outline-none placeholder-slate-400 border-b-2 border-dashed border-slate-300 focus:border-blue-500 pb-0.5 transition-colors"
                                    placeholder="Skriv navn..."
                                />
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-5">
                        <div className="lg:col-span-8 flex flex-col space-y-4 md:space-y-5">
                            <div className="bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-slate-200 relative overflow-x-auto overflow-y-hidden hide-scrollbar">
                                <div className="min-w-[700px]">
                                    <div className="absolute top-1/2 left-8 right-8 h-1 bg-slate-200 -translate-y-1/2 rounded-full"></div>
                                    <motion.div 
                                        className="absolute top-1/2 left-8 h-1 bg-blue-500 -translate-y-1/2 rounded-full"
                                        animate={{ width: `calc(${(activeStep / (steps.length - 1)) * 100}% - 32px)` }}
                                    ></motion.div>

                                    <div className="relative flex justify-between">
                                        {steps.map((s, i) => (
                                            <div key={i} className="flex flex-col items-center">
                                                <button 
                                                    onClick={() => { setActiveStep(i); setIsAutoPlaying(false); }}
                                                    className={`w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center z-10 transition-all duration-300 border-2 ${
                                                        i === activeStep ? 'bg-blue-600 border-blue-200 text-white shadow-md scale-110 rotate-0 text-lg' : 
                                                        i < activeStep ? 'bg-blue-500 border-blue-200 text-white text-lg' : 'bg-white border-slate-200 text-slate-400 rotate-12 hover:border-blue-300 text-lg'
                                                    }`}
                                                >
                                                    {i < activeStep && i !== activeStep ? "✓" : s.icon}
                                                </button>
                                                <span className={`absolute mt-14 text-[9px] md:text-[10px] font-bold uppercase tracking-wide text-center w-20 leading-tight ${i === activeStep ? 'text-blue-700 font-black' : 'text-slate-500'}`}>
                                                    {s.title}
                                                </span>
                                            </div>
                                        ))}
                                    </div>

                                    {viewMode === 'business' && (
                                        <motion.div 
                                            className="absolute top-1/2 -translate-y-1/2 pointer-events-none"
                                            animate={{ 
                                                left: `calc(${(activeStep / (steps.length - 1)) * 100}% + 40px)`,
                                                x: -40 
                                            }}
                                            transition={{ type: "spring", stiffness: 30, damping: 10 }}
                                        >
                                            <div className="flex flex-col items-center">
                                                <motion.div animate={{ y: [0, -6, 0] }} transition={{ repeat: Infinity }} className="text-3xl mb-1">🚶‍♂️</motion.div>
                                                <div className="bg-emerald-500 text-white text-[9px] font-black px-3 py-1 rounded-full shadow-md whitespace-nowrap">
                                                    {employeeName || "Ansatt"}
                                                </div>
                                            </div>
                                        </motion.div>
                                    )}
                                </div>
                            </div>

                            <AnimatePresence mode="wait">
                                {viewMode === 'business' ? (
                                    <motion.div 
                                        key="business-view"
                                        initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }}
                                        className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 flex-1"
                                    >
                                        <div className="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-slate-200 flex flex-col justify-between h-full">
                                            <div>
                                                <div className="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-3 flex items-center">
                                                    <span className="w-6 h-1 bg-blue-600 mr-2 rounded-full"></span> EVALUERING & LØSNING
                                                </div>
                                                <h2 className="text-xl md:text-2xl font-black mb-3 text-slate-900 leading-tight">{steps[activeStep].title}</h2>
                                                <p className="text-slate-700 text-sm md:text-base font-medium leading-relaxed mb-4">{steps[activeStep].desc}</p>
                                            </div>
                                            
                                            <div className="mt-2 space-y-3">
                                                <div className="flex items-start">
                                                    <div className="bg-blue-100 p-2 rounded-lg mr-3 text-blue-600 text-base">⚡</div>
                                                    <div>
                                                        <div className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-0.5">Automatisering</div>
                                                        <div className="text-xs font-semibold text-slate-800">{steps[activeStep].automation}</div>
                                                    </div>
                                                </div>
                                                
                                                <button 
                                                    onClick={toggleViewMode}
                                                    className="w-full mt-4 bg-slate-800 text-white hover:bg-slate-700 rounded-xl py-3 px-4 flex items-center justify-center font-bold text-xs uppercase tracking-widest transition-colors shadow-sm border border-slate-700"
                                                >
                                                    <span className="text-base mr-2">⚙️</span> Utforske Teknisk Arkitektur
                                                </button>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 rounded-2xl flex flex-col items-center justify-center p-5 shadow-inner border-2 border-slate-200 overflow-hidden relative min-h-[250px] h-full">
                                            <motion.div 
                                                key={`icon-${activeStep}`}
                                                initial={{ scale: 0.8, opacity: 0, rotateY: 90 }} animate={{ scale: 1, opacity: 1, rotateY: 0 }}
                                                className="text-7xl md:text-8xl relative z-10 mb-5 drop-shadow-md"
                                            >
                                                {steps[activeStep].icon}
                                            </motion.div>
                                            <div className="text-[10px] font-bold text-blue-700 bg-blue-100 px-4 py-1.5 rounded-full border border-blue-200 text-center uppercase tracking-wide shadow-sm">
                                                OMRÅDE: {steps[activeStep].systems}
                                            </div>
                                        </div>
                                    </motion.div>

                                ) : (

                                    <motion.div 
                                        key="technical-view"
                                        initial={{ opacity: 0, x: 50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -50 }}
                                        className="bg-white rounded-2xl p-6 md:p-8 shadow-md border-2 border-slate-300 flex-1 flex flex-col relative overflow-hidden"
                                    >
                                        <div className="absolute inset-0 opacity-5 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#334155 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                        
                                        <div className="relative z-10 mb-6 flex justify-between items-start">
                                            <div>
                                                <div className="text-slate-500 font-black text-xs uppercase tracking-widest mb-1 flex items-center">
                                                    <span className="text-lg mr-2">⚙️</span> POTENSIELL ARKITEKTUR / GJENBRUK
                                                </div>
                                                <h2 className="text-2xl md:text-3xl font-black text-slate-900 mb-2">Løsningsforslag for {steps[activeStep].title.toLowerCase()}</h2>
                                                <p className="text-slate-600 text-base md:text-lg font-medium max-w-3xl">
                                                    {steps[activeStep].techDetails.desc}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="flex-1 flex flex-col md:flex-row items-center justify-center space-y-6 md:space-y-0 md:space-x-4 relative z-10 py-6">
                                            {steps[activeStep].techDetails.nodes.map((node, index) => (
                                                <React.Fragment key={index}>
                                                    <motion.div 
                                                        initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: index * 0.15 }}
                                                        className={`border-2 shadow-sm rounded-xl p-5 w-full md:w-1/3 text-center flex flex-col items-center h-full min-h-[180px] justify-start ${node.color}`}
                                                    >
                                                        <div className="text-5xl mb-4 bg-white/50 p-2 rounded-2xl shadow-sm">{node.icon}</div>
                                                        <div className="font-black text-current text-sm md:text-base uppercase tracking-wider mb-2">{node.tool}</div>
                                                        <div className="text-xs font-bold bg-white/70 px-3 py-1 rounded-full mb-3 shadow-sm">{node.action}</div>
                                                        <div className="text-[11px] font-medium opacity-80 leading-snug">{node.details}</div>
                                                    </motion.div>

                                                    {index < steps[activeStep].techDetails.nodes.length - 1 && (
                                                        <motion.div 
                                                            initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: (index * 0.15) + 0.1 }}
                                                            className="flex flex-col items-center justify-center text-slate-300"
                                                        >
                                                            <svg className="w-8 h-8 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                                            <svg className="w-8 h-8 md:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                                                        </motion.div>
                                                    )}
                                                </React.Fragment>
                                            ))}
                                        </div>

                                        {/* Ny Tilbake-knapp nede i hjørnet for arkitektur-visningen */}
                                        <div className="relative z-10 mt-auto pt-4 flex justify-end">
                                            <button 
                                                onClick={toggleViewMode}
                                                className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 px-6 md:px-8 rounded-xl shadow-md transition-colors flex items-center text-xs md:text-sm uppercase tracking-widest"
                                            >
                                                ← Tilbake til Prosess
                                            </button>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        <div className="lg:col-span-4 flex flex-col space-y-4 md:space-y-5">
                            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[320px] md:h-[350px]">
                                <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-4 flex justify-between items-center border-b-2 border-slate-100 pb-3 shrink-0">
                                    VURDERINGSSPOR (LIVE)
                                    <span className="flex h-2.5 w-2.5 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                                    </span>
                                </h3>
                                <div className="space-y-3 flex-1 font-mono text-[10px] md:text-xs overflow-y-auto pr-2 thin-scrollbar">
                                    <AnimatePresence>
                                        {auditTrail.map((log, i) => (
                                            <motion.div 
                                                key={log + i}
                                                initial={{ x: 20, opacity: 0 }} animate={{ x: 0, opacity: 1 }}
                                                className={`p-3 rounded-xl border-l-4 shadow-sm ${i === 0 ? 'bg-blue-50 border-blue-500 text-blue-900 font-bold' : 'bg-slate-50 border-slate-300 text-slate-600'}`}
                                            >
                                                <span className="opacity-60 mr-2 text-[9px] md:text-[10px] font-semibold">[{new Date().toLocaleTimeString()}]</span>
                                                <span dangerouslySetInnerHTML={{__html: log.replace(`[${employeeName}]`, `<span class="text-blue-600 font-black bg-blue-100 px-1 rounded">[${employeeName}]</span>`)}}></span>
                                            </motion.div>
                                        ))}
                                    </AnimatePresence>
                                </div>
                                <div className="mt-4 pt-4 border-t-2 border-slate-100 shrink-0">
                                    <div className="flex justify-between text-[10px] md:text-xs font-bold text-slate-600 uppercase mb-2">
                                        <span>Prosess-Modenhet</span>
                                        <motion.span key={activeStep} initial={{ scale: 1.5, color: '#2563eb' }} animate={{ scale: 1, color: '#475569' }} className="font-black text-blue-600">
                                            {Math.round((activeStep + 1) / steps.length * 100)}%
                                        </motion.span>
                                    </div>
                                    <div className="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                                        <motion.div className="h-full bg-emerald-500" animate={{ width: `${(activeStep + 1) / steps.length * 100}%` }}></motion.div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-800 rounded-2xl p-5 shadow-md hidden md:block border-2 border-slate-700">
                                <h4 className="font-black text-[10px] uppercase tracking-widest text-emerald-400 mb-2 flex items-center">
                                    <span className="text-base mr-2">⚠️</span> Strategi & Lederfilosofi
                                </h4>
                                <p className="text-xs md:text-sm leading-relaxed font-semibold text-slate-300">
                                    Min filosofi er <span className="text-white">ydmykhet for dagens løsninger, kombinert med handlekraft.</span> Vi bygger "Røysumtunet-tilpassede" rutiner (eks. ITIL-light) og utnytter eksisterende løsninger maksimalt.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 md:mt-5 flex justify-between items-center px-3 md:px-5 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <button 
                            onClick={() => { setActiveStep(Math.max(0, activeStep - 1)); setViewMode('business'); }}
                            className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-slate-100 text-slate-600 border-2 border-slate-300 flex items-center justify-center hover:bg-slate-200 hover:text-slate-900 disabled:opacity-30 transition-all hover:-translate-x-1 font-bold text-lg"
                            disabled={activeStep === 0}
                        >
                            ←
                        </button>
                        
                        <div className="text-slate-500 text-[10px] md:text-xs font-black tracking-widest uppercase hidden md:block">
                            {viewMode === 'technical' ? "Bruk knappen i arkitekturbildet for å gå tilbake" : "👆 Klikk på knappen til høyre for neste vurderingspunkt"}
                        </div>

                        <button 
                            onClick={() => { setActiveStep(Math.min(steps.length - 1, activeStep + 1)); setViewMode('business'); }}
                            className="px-6 md:px-8 h-10 md:h-12 rounded-full bg-blue-600 text-white font-black text-[10px] md:text-xs uppercase tracking-widest hover:bg-blue-500 hover:shadow-md transition-all disabled:opacity-30 disabled:hover:shadow-none flex items-center shadow-sm"
                            disabled={activeStep === steps.length - 1}
                        >
                            {steps[activeStep].actionLabel}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OnboardingApp />);
    </script>
</body>
</html>
