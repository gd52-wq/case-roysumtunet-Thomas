<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Røysumtunet - Strategisk IKT-Ledelse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>

            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            background-color: #f8fafc; 
            color: #0f172a; 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .thin-scrollbar::-webkit-scrollbar { width: 6px; }

<body>
    <div id="root"></div>

                    tech: {

                            { role: "IKT", text: "Dette er kritisk for revisjon. Kan vi automatisere sperring av tilgang hvis kontrakten ikke er signert?" },

                    tech: {
                        concept: "Sikkerhets-gateway",

                            { tool: "BankID", action: "Identitetskontroll", icon: "🔐", color: "bg-orange-50 border-orange-200 text-orange-700" },

                    }
                },
                {
                    title: "Rollestyring",
                    icon: "🔑",

                    tech: {

                        involvement: "Adm.dir, Styre, Kvalitetsleder.",
                        goal: "Snu IT fra et kostnadssenter til et strategisk styringsverktøy.",
                        dialogue: [
                            { role: "IKT", text: "Dette dashbordet er beviset på at styrets satsning gir resultater. Vi måler compliance hver time." },
                            { role: "Adm.dir", text: "Dette gir oss tryggheten vi trenger for å satse videre på digitalisering." }
                        ]

                    business: {
                        desc: "Sanntidsdata gir ledelsen grunnlag for bedre beslutninger.",

                        <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner gap-1">

                                { id: 'business', label: '2. Brukerverdi', icon: '💡' },

                                <button

                                    onClick={() => setViewMode(mode.id)}
                                    className={`px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-wider transition-all flex items-center gap-2 ${viewMode === mode.id ? 'bg-white text-blue-600 shadow-sm border border-slate-200' : 'text-slate-400 hover:text-slate-600'}`}
                                >
                                    <span>{mode.icon}</span> {mode.label}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 flex-1">
                        
                        {/* Main Content Area */}
                        <div className="lg:col-span-8 space-y-6">
                            
                            {/* Navigation Bar */}

                                        className="absolute top-1/2 left-10 h-1 bg-blue-600 -translate-y-1/2 rounded-full"
                                        animate={{ width: `calc(${(activeStep / (steps.length - 1)) * 100}% - 40px)` }}
                                    ></motion.div>
                                    {steps.map((s, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => {setActiveStep(i); setViewMode('mapping');}}
                                            className={`relative z-10 w-12 h-12 rounded-full border-2 transition-all flex items-center justify-center font-bold ${i <= activeStep ? 'bg-blue-600 border-blue-400 text-white shadow-lg' : 'bg-white border-slate-200 text-slate-300'}`}
                                        >
                                            {i < activeStep ? "✓" : s.icon}
                                            <span className={`absolute -bottom-8 left-1/2 -translate-x-1/2 text-[9px] font-black uppercase whitespace-nowrap tracking-widest ${i === activeStep ? 'text-blue-600' : 'text-slate-400'}`}>
                                                {s.title}
                                            </span>
                                        </button>
                                    ))}
                                </div>
                                <div className="h-6"></div>
                            </div>

                            <AnimatePresence mode="wait">
                                {viewMode === 'mapping' && (
                                    <motion.div 
                                        key="mapping" initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 10 }}

                                    >
                                        <div className="flex justify-between items-start mb-8">
                                            <div>
                                                <span className="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Fase 1: Fra Analyse til Gjennomføring</span>
                                                <h2 className="text-4xl font-black text-slate-900 mt-3 tracking-tight">Vurdering: {steps[activeStep].title}</h2>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                                                <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">IKT-Drift Fokus</div>
                                                <div className="text-sm font-bold text-slate-700">{steps[activeStep].systems}</div>
                                            </div>
                                        </div>

                                                <thead>
                                                    <tr className="bg-slate-50 border-b border-slate-200 uppercase tracking-widest">
                                                        <th className="px-6 py-4 font-black text-slate-400 w-1/4 text-[10px]">Område</th>
                                                        <th className="px-6 py-4 font-black text-red-500 bg-red-50/50 text-[10px]">Historisk (Manuelt)</th>
                                                        <th className="px-6 py-4 font-black text-emerald-600 bg-emerald-50/50 text-[10px]">Nye Røysumtunet (Auto)</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="bg-white">
                                                    <tr className="border-b border-slate-100 transition-colors hover:bg-slate-50/50">
                                                        <td className="px-6 py-4 font-bold text-slate-700">Onboarding</td>
                                                        <td className="px-6 py-4 text-slate-500 italic">Manuell punch (E-post)</td>
                                                        <td className="px-6 py-4 text-emerald-700 font-black underline decoration-emerald-200">Visma ➔ Power Automate</td>
                                                    </tr>
                                                    <tr className="border-b border-slate-100 transition-colors hover:bg-slate-50/50">
                                                        <td className="px-6 py-4 font-bold text-slate-700">IKT-Drift (Martin)</td>
                                                        <td className="px-6 py-4 text-slate-500 italic">Brannslukking & Manuelle kontoer</td>
                                                        <td className="px-6 py-4 text-emerald-700 font-black underline decoration-emerald-200">RBAC ➔ Zero-Touch Deployment</td>
                                                    </tr>
                                                    <tr className="transition-colors hover:bg-slate-50/50">
                                                        <td className="px-6 py-4 font-bold text-slate-700">Ledelseskontroll</td>
                                                        <td className="px-6 py-4 text-slate-500 italic">Excel-ark & Antagelser</td>
                                                        <td className="px-6 py-4 text-emerald-700 font-black underline decoration-emerald-200">Power BI ➔ Sanntids-Compliance</td>
                                                    </tr>
                                                </tbody>
                                            </table>

                                                    </h3>

                                                        <div key={mi} className={`flex flex-col ${msg.role === 'IKT' ? 'items-start' : 'items-end'}`}>

                                                                {msg.text}
                                                            </div>
                                                            <span className="text-[8px] font-black text-slate-400 uppercase mt-1.5 px-2">{msg.role}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col gap-6">
                                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Interessenter i rommet</h3>
                                                    <div className="flex flex-wrap gap-2">
                                                        {steps[activeStep].mapping.involvement.split(', ').map((person, pi) => (
                                                            <span key={pi} className="bg-white px-4 py-2 rounded-xl shadow-sm text-[11px] font-bold text-slate-600 border border-slate-200">
                                                                👤 {person}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-blue-50 p-6 rounded-3xl border-l-4 border-blue-600">
                                                    <h3 className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-3">Mål med min ledelse</h3>
                                                    <p className="text-blue-900 font-bold leading-relaxed">{steps[activeStep].mapping.goal}</p>

                                                >
                                                    Se Foreslått Prosess →
                                                </button>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}

                                {viewMode === 'business' && (
                                    <motion.div 
                                        key="business" initial={{ opacity: 0, scale: 0.98 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.98 }}

                                    >
                                        <div className="mb-10">
                                            <span className="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Fase 2: Brukerverdi & Operasjonell Flyt</span>
                                            <h2 className="text-4xl font-black text-slate-900 mt-3 tracking-tight">{steps[activeStep].title} i praksis</h2>
                                        </div>
                                        
                                        <div className="grid md:grid-cols-2 gap-12 flex-1 items-center">
                                            <div>
                                                <p className="text-2xl text-slate-800 font-semibold leading-snug mb-8 border-l-8 border-emerald-500 pl-8">
                                                    "{steps[activeStep].business.desc}"
                                                </p>
                                                <div className="bg-emerald-50 p-6 rounded-3xl font-black text-sm text-emerald-800 flex items-start gap-4">
                                                    <span className="text-3xl">🎯</span>
                                                    <div>
                                                        <div className="uppercase text-[9px] tracking-widest opacity-60 mb-1 text-emerald-600">Forventet Gevinst</div>
                                                        {steps[activeStep].business.automation}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="bg-slate-50 rounded-[3rem] aspect-square flex flex-col items-center justify-center text-[10rem] shadow-inner relative group border border-slate-200">
                                                <div className="absolute top-6 right-8 text-[9px] font-black text-slate-300 uppercase tracking-[0.3em]">Visualisering</div>
                                                <motion.div animate={{ y: [0, -10, 0] }} transition={{ repeat: Infinity, duration: 4 }}>
                                                    {steps[activeStep].icon}
                                                </motion.div>
                                                <div className="text-[11px] font-black text-slate-400 uppercase mt-10 tracking-[0.4em]">{steps[activeStep].systems}</div>
                                            </div>
                                        </div>
                                        <div className="mt-12 flex flex-col md:flex-row gap-4">
                                            <button onClick={() => setViewMode('mapping')} className="px-8 py-5 rounded-2xl font-black text-xs uppercase text-slate-400 hover:text-slate-600 transition-all tracking-widest">← Juster forutsetninger</button>
                                            <button 
                                                onClick={() => setViewMode('technical')} 
                                                className="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-slate-900 shadow-xl transition-all flex items-center justify-center gap-3"
                                            >
                                                ⚙️ Se realisering (Martin & IKT)
                                            </button>
                                        </div>
                                    </motion.div>
                                )}

                                {viewMode === 'technical' && (
                                    <motion.div 
                                        key="technical" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }}
                                        className="bg-slate-900 rounded-[2.5rem] p-10 shadow-2xl border-t-8 border-blue-600 flex-1 flex flex-col relative overflow-hidden"
                                    >
                                        <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#fff 0.5px, transparent 0.5px)', backgroundSize: '30px 30px' }}></div>
                                        <div className="mb-12 relative z-10">
                                            <span className="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Fase 3: Teknisk Fundament</span>
                                            <h2 className="text-4xl font-black text-white mt-3 tracking-tight">{steps[activeStep].tech.concept}</h2>
                                        </div>

                                        <div className="flex-1 flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 relative z-10">
                                            {steps[activeStep].tech.nodes.map((node, ni) => (
                                                <React.Fragment key={ni}>
                                                    <motion.div 
                                                        initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} transition={{ delay: ni * 0.1 }}
                                                        className={`p-8 rounded-[2rem] border-2 shadow-2xl w-full md:w-64 text-center group hover:bg-white transition-all duration-500 bg-slate-800 border-slate-700`}
                                                    >
                                                        <div className="text-6xl mb-6 grayscale group-hover:grayscale-0 transition-all">{node.icon}</div>
                                                        <div className="font-black text-sm uppercase mb-2 text-white group-hover:text-blue-600 transition-colors">{node.tool}</div>
                                                        <div className="text-[10px] font-bold uppercase tracking-tighter text-slate-400 group-hover:text-slate-600">{node.action}</div>
                                                    </motion.div>
                                                    {ni < steps[activeStep].tech.nodes.length - 1 && <div className="text-blue-600 text-4xl font-black animate-pulse">➔</div>}
                                                </React.Fragment>
                                            ))}
                                        </div>

                                        <div className="mt-12 flex justify-between items-center relative z-10 border-t border-slate-800 pt-8">
                                            <button onClick={() => setViewMode('business')} className="text-slate-500 font-black text-xs uppercase hover:text-white transition-all tracking-widest">← Tilbake til prosess</button>
                                            <div className="flex gap-4">
                                                <button 
                                                    onClick={() => {
                                                        if (activeStep < steps.length - 1) {
                                                            setActiveStep(activeStep + 1);
                                                            setViewMode('mapping');
                                                        }
                                                    }}
                                                    className="bg-white text-slate-900 px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-xl"
                                                >
                                                    Neste vurderingsområde →
                                                </button>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        {/* Sidebar / Logs */}
                        <div className="lg:col-span-4 flex flex-col gap-6">
                            
                            {/* Live Compliance Log */}
                            <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-200 flex-1 flex flex-col max-h-[500px]">
                                <h3 className="text-[10px] font-black text-slate-800 uppercase tracking-[0.3em] mb-6 flex justify-between items-center border-b pb-4">
                                    Digital Revisjonslogg
                                    <span className="flex h-2 w-2 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                                    </span>
                                </h3>
                                <div className="flex-1 overflow-y-auto space-y-4 thin-scrollbar pr-2 font-mono text-[10px]">
                                    <AnimatePresence initial={false}>
                                        {auditTrail.map((log, li) => (
                                            <motion.div 
                                                key={li + log} initial={{ x: 20, opacity: 0 }} animate={{ x: 0, opacity: 1 }} 
                                                className={`p-4 rounded-2xl border-l-4 shadow-sm ${li === 0 ? 'bg-blue-50 border-blue-600 font-bold text-blue-900' : 'bg-slate-50 border-slate-300 text-slate-400'}`}
                                            >
                                                <span className="opacity-40 mr-2 text-[9px] uppercase tracking-tighter">Event_ID_{1000-li}</span> 
                                                {log}
                                            </motion.div>
                                        ))}
                                    </AnimatePresence>
                                </div>
                                <div className="mt-6 pt-6 border-t">
                                    <div className="flex justify-between items-center mb-2">
                                        <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Transformasjons-fremdrift</div>
                                        <div className="text-[10px] font-black text-blue-600">{Math.round((activeStep + 1) / steps.length * 100)}%</div>
                                    </div>
                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <motion.div className="h-full bg-blue-600" animate={{ width: `${(activeStep + 1) / steps.length * 100}%` }}></motion.div>
                                    </div>
                                </div>
                            </div>

                            {/* Strategic Insight */}
                            <div className="bg-slate-900 rounded-3xl p-8 shadow-2xl border-b-8 border-blue-600">
                                <h4 className="text-blue-400 font-black text-[10px] uppercase tracking-widest mb-3">💡 Strategisk Lederskap</h4>
                                <p className="text-xs font-bold text-slate-300 leading-relaxed italic opacity-80">
                                    "Min rolle er å bygge videre på det arbeidet som allerede er gjort, og omsette dette til varige arbeidsformer i organisasjonen. Det innebærer å jobbe tett med Martin og avdelingene, og sikre at ledelsen over tid får den effekten de forventer av satsingen på IT og digitalisering."
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OnboardingApp />);
    </script>
</body>
</html>
