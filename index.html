<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Røysumtunet - Automatisert Compliance-reise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            background-color: #f1f5f9; 
            color: #0f172a; 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .thin-scrollbar::-webkit-scrollbar { width: 5px; }
        .thin-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const OnboardingApp = () => {
            const [activeStep, setActiveStep] = useState(0);
            const [auditTrail, setAuditTrail] = useState([]);
            const [employeeName, setEmployeeName] = useState("Roar Røysum"); 
            const [viewMode, setViewMode] = useState("mapping"); 

            const steps = [
                {
                    title: "Masterdata",
                    icon: "🏢",
                    systems: "Visma HRM / M365 Forms",
                    mapping: {
                        before: "Ledere sender e-post med mangelfull info. HR puncher data manuelt inn i Visma.",
                        after: "Strukturert inntak via Forms trigger automatisk flyt til Visma og IKT.",
                        current: "Ustrukturerte bestillinger fører til feil i navn, datoer og tilganger.",
                        involvement: "HR-ansvarlig, Avdelingsledere, Martin (IKT).",
                        goal: "Etablere 'Single Source of Truth' i Visma uten manuelle mellomledd.",
                        dialogue: [
                            { role: "IKT-Sjef", text: "Hvor kommer informasjonen om de nye ansatte fra i dag?" },
                            { role: "HR", text: "Vi får som regel en e-post, men ofte mangler personnummer og nøyaktig startdato." }
                        ]
                    },
                    business: {
                        desc: `HR ansetter ${employeeName} i Visma. Data flyter automatisk til alle ledd.`,
                        automation: "Fjerner manuell punching og eliminerer ventetid på e-post."
                    },
                    tech: {
                        concept: "Fra e-post til strukturert data",
                        nodes: [
                            { tool: "MS Forms", action: "Strukturert inntak", icon: "📝", color: "bg-blue-50 border-blue-200" },
                            { tool: "Power Automate", action: "API-overføring", icon: "⚙️", color: "bg-indigo-50 border-indigo-200" }
                        ]
                    }
                },
                {
                    title: "Digital Kontrakt",
                    icon: "✍️",
                    systems: "BankID / PowerOffice",
                    mapping: {
                        before: "Papirkontrakter eller PDF-er scannes og lagres manuelt i mapper.",
                        after: "Digital signering ruter ferdig dokument direkte til personalarkiv.",
                        current: "Tidkrevende oppfølging av signaturer og risiko for manglende arkivering.",
                        involvement: "HR, Ansatt, Arkivansvarlig.",
                        goal: "100% digital signering med automatisk arkivering for full compliance.",
                        dialogue: [
                            { role: "IKT-Sjef", text: "Hvordan vet vi med sikkerhet at kontrakten er arkivert før oppstart?" },
                            { role: "HR", text: "I dag må vi sjekke personalmapper manuelt for å verifisere at alt er på plass." }
                        ]
                    },
                    business: {
                        desc: `${employeeName} signerer digitalt. Kontrakten lander automatisk i PowerOffice.`,
                        automation: "Eliminerer scanning og manuell ruting av dokumenter."
                    },
                    tech: {
                        concept: "Sikker dokumentflyt",
                        nodes: [
                            { tool: "BankID", action: "Autentisering", icon: "🔐", color: "bg-orange-50 border-orange-200" },
                            { tool: "PowerOffice API", action: "Auto-arkiv", icon: "📁", color: "bg-emerald-50 border-emerald-200" }
                        ]
                    }
                },
                {
                    title: "Rollestyring",
                    icon: "🔑",
                    systems: "AD / Entra ID",
                    mapping: {
                        before: "Martin oppretter kontoer manuelt basert på e-post-bestilling.",
                        after: "Systemet leser stillingskode og oppretter tilganger automatisk (RBAC).",
                        current: "Brukerfeil ved punching og 'copy-paste' av gamle brukere gir feil tilgang.",
                        involvement: "IKT-tekniker (Martin), Fagledere.",
                        goal: "Sikre 'least privilege' og fjerne personavhengighet i IKT-drift.",
                        dialogue: [
                            { role: "IKT-Sjef", text: "Martin, hvor mye tid bruker du på å rette opp feil i AD-kontoer?" },
                            { role: "Martin", text: "Hver uke må jeg endre navn eller grupper fordi infoen jeg fikk var utdatert." }
                        ]
                    },
                    business: {
                        desc: `Brukerkonto for ${employeeName} er klar med riktige tilganger fra dag én.`,
                        automation: "Konto opprettes av systemet basert på rolle, ikke av Martin manuelt."
                    },
                    tech: {
                        concept: "Automatisert Identitet (IAM)",
                        nodes: [
                            { tool: "PowerShell", action: "AD-Provisjonering", icon: "💻", color: "bg-slate-50 border-slate-200" },
                            { tool: "Entra ID", action: "Cloud Sync", icon: "☁️", color: "bg-sky-50 border-sky-200" }
                        ]
                    }
                },
                {
                    title: "Sikker Tilgang",
                    icon: "🛡️",
                    systems: "M365 / SSO / MFA",
                    mapping: {
                        before: "Brukerne logger på ulike systemer med ulike passord.",
                        after: "Single Sign-On (SSO) sikret med én pålogging og MFA.",
                        current: "Gule lapper og 'passord-tretthet' utgjør en sikkerhetsrisiko.",
                        involvement: "IKT-sikkerhet, Superbrukere.",
                        goal: "Fjerne friksjon for pleierne og styrke sikkerheten med MFA.",
                        dialogue: [
                            { role: "IKT-Sjef", text: "Hvor mange passord må en pleier huske i løpet av en vakt?" },
                            { role: "Leder", text: "Alt for mange. Det ender ofte med at de skriver dem ned." }
                        ]
                    },
                    business: {
                        desc: `${employeeName} logger på alt med én bruker. Sikret med MFA.`,
                        automation: "Automatisk tildeling av lisenser sparer tid og penger."
                    },
                    tech: {
                        concept: "Modern Workplace",
                        nodes: [
                            { tool: "Conditional Access", action: "Sikrer MFA", icon: "📱", color: "bg-red-50 border-red-200" },
                            { tool: "SAML / SSO", action: "Fagsystem-link", icon: "🔑", color: "bg-blue-50 border-blue-200" }
                        ]
                    }
                },
                {
                    title: "Klientdrift",
                    icon: "💻",
                    systems: "Intune / Autopilot",
                    mapping: {
                        before: "IKT installerer hver PC manuelt før utlevering.",
                        after: "Zero-Touch: PC klargjøres automatisk når bruker logger på.",
                        current: "Kø hos IKT ved store utskiftninger og lang ventetid på utstyr.",
                        involvement: "Martin (IKT), Leverandør.",
                        goal: "Effektiv logistikk og standardisert oppsett (BitLocker/Kryptering).",
                        dialogue: [
                            { role: "IKT-Sjef", text: "Hva skjer når vi får 20 nye maskiner samtidig?" },
                            { role: "Martin", text: "Da blir jeg sittende i dagevis bare for å installere Windows og apper." }
                        ]
                    },
                    business: {
                        desc: `${employeeName} logger på ny maskin. Alt installeres automatisk.`,
                        automation: "Frigjør IKT-ressurser fra 'samlebåndsarbeid' til brukerstøtte."
                    },
                    tech: {
                        concept: "Zero-Touch Deployment",
                        nodes: [
                            { tool: "Autopilot", action: "Hardware Hash", icon: "🌐", color: "bg-blue-50 border-blue-200" },
                            { tool: "Intune", action: "Profil-push", icon: "⚙️", color: "bg-purple-50 border-purple-200" }
                        ]
                    }
                },
                {
                    title: "Etterlevelse",
                    icon: "🚀",
                    systems: "Audit / Power BI",
                    mapping: {
                        before: "Manuell leting i mapper og systemer ved tilsyn.",
                        after: "Live Dashboard viser compliance-status i sanntid.",
                        current: "Ledelsen har ikke oversikt over hvem som har fullført lovpålagte kurs.",
                        involvement: "Adm. Dir (Kine), Kvalitetsleder.",
                        goal: "Bevege oss fra 'reaktiv' til 'proaktiv' internkontroll (PDCA).",
                        dialogue: [
                            { role: "Direktør", text: "Hvor lang tid tar det å få ut en liste over alle med tilgang til pasientdata?" },
                            { role: "Kvalitetsleder", text: "I dag må vi koble sammen data fra tre ulike systemer manuelt." }
                        ]
                    },
                    business: {
                        desc: "Kine har full oversikt over compliance via et levende dashboard.",
                        automation: "Rapportering skjer automatisk, ikke som skippertak før tilsyn."
                    },
                    tech: {
                        concept: "Compliance Dashboard",
                        nodes: [
                            { tool: "Log Analytics", action: "Sanking", icon: "🔍", color: "bg-slate-50 border-slate-200" },
                            { tool: "Power BI", action: "Ledelsesinfo", icon: "📊", color: "bg-yellow-50 border-yellow-200" }
                        ]
                    }
                }
            ];

            useEffect(() => {
                const logs = [
                    `[KARTLEGGING] Analyserer dagens flyt for ${steps[activeStep].title}.`,
                    `[AUDIT] Verifiserer smertepunkter: "${steps[activeStep].mapping.current}"`,
                    `[COMPLIANCE] Definerer målbilde for automatisert etterlevelse.`
                ];
                setAuditTrail(prev => [logs[activeStep % 3], ...prev].slice(0, 10));
            }, [activeStep]);

            return (
                <div className="min-h-screen flex flex-col p-4 max-w-[1400px] mx-auto overflow-hidden">
                    
                    {/* Header */}
                    <header className="flex flex-col md:flex-row md:justify-between md:items-center mb-6">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black text-slate-900 flex items-center">
                                <span className="text-blue-600 mr-2 uppercase">RØYSUMTUNET</span> 
                                <span className="text-slate-400 font-light">| Compliance-reise</span>
                            </h1>
                            <p className="text-slate-500 text-sm font-bold uppercase tracking-widest">Brukerinvolvering ➔ Prosess ➔ Arkitektur</p>
                        </div>
                        <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 mt-4 md:mt-0">
                            {[
                                { id: 'mapping', label: '1. Kartlegging', icon: '🔍' },
                                { id: 'business', label: '2. Løsning', icon: '💡' },
                                { id: 'technical', label: '3. Arkitektur', icon: '⚙️' }
                            ].map(mode => (
                                <button 
                                    key={mode.id}
                                    onClick={() => setViewMode(mode.id)}
                                    className={`px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all flex items-center ${viewMode === mode.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                                >
                                    <span className="mr-2">{mode.icon}</span> {mode.label}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Venstre side */}
                        <div className="lg:col-span-8 flex flex-col space-y-6 overflow-y-auto hide-scrollbar pr-1">
                            
                            {/* Steg-velger */}
                            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 overflow-x-auto hide-scrollbar shrink-0">
                                <div className="min-w-[700px] relative">
                                    <div className="absolute top-1/2 left-10 right-10 h-1 bg-slate-100 -translate-y-1/2 rounded-full"></div>
                                    <motion.div 
                                        className="absolute top-1/2 left-10 h-1 bg-blue-500 -translate-y-1/2 rounded-full"
                                        animate={{ width: `calc(${(activeStep / (steps.length - 1)) * 100}% - 40px)` }}
                                    ></motion.div>
                                    <div className="relative flex justify-between">
                                        {steps.map((s, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => {setActiveStep(i); setViewMode('mapping');}}
                                                className={`w-12 h-12 rounded-full z-10 border-2 transition-all duration-300 flex items-center justify-center ${i <= activeStep ? 'bg-blue-600 border-blue-200 text-white shadow-sm' : 'bg-white border-slate-200 text-slate-400'}`}
                                            >
                                                {i < activeStep ? "✓" : s.icon}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* HOVEDAREAL */}
                            <AnimatePresence mode="wait">
                                {viewMode === 'mapping' && (
                                    <motion.div 
                                        key="mapping" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }}
                                        className="bg-white rounded-[2rem] p-8 shadow-md border-2 border-blue-100 flex-1 flex flex-col"
                                    >
                                        <div className="mb-6">
                                            <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest tracking-tighter">Steg {activeStep + 1}: Brukerinvolvering & Kartlegging</span>
                                            <h2 className="text-3xl font-black text-slate-900 mt-2">{steps[activeStep].title}</h2>
                                        </div>

                                        {/* STEG-SPESIFIKK SAMMENLIGNING */}
                                        <div className="mb-8 grid grid-cols-2 gap-4">
                                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">I dag (Manuelt)</h3>
                                                <p className="text-sm font-bold text-slate-700 leading-relaxed">{steps[activeStep].mapping.before}</p>
                                            </div>
                                            <div className="bg-blue-50 p-5 rounded-2xl border-2 border-blue-200">
                                                <h3 className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">Målbilde (Automatisert)</h3>
                                                <p className="text-sm font-black text-blue-900 leading-relaxed italic">{steps[activeStep].mapping.after}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="grid md:grid-cols-2 gap-8 flex-1">
                                            <div className="space-y-6">
                                                <div className="bg-slate-50 p-5 rounded-2xl border-l-4 border-slate-300 shadow-sm">
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Smertepunkt identifisert</h3>
                                                    <p className="text-slate-700 font-bold leading-relaxed">{steps[activeStep].mapping.current}</p>
                                                </div>
                                                
                                                <div className="bg-white p-6 rounded-3xl border-2 border-dashed border-slate-200 shadow-sm">
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Dialog fra kartlegging</h3>
                                                    <div className="space-y-4">
                                                        {steps[activeStep].mapping.dialogue.map((msg, mi) => (
                                                            <div key={mi} className={`flex flex-col ${msg.role === 'IKT-Sjef' ? 'items-start' : 'items-end'}`}>
                                                                <span className="text-[9px] font-black text-slate-400 uppercase mb-1">{msg.role}</span>
                                                                <div className={`px-4 py-2 rounded-2xl text-xs font-medium max-w-[85%] ${msg.role === 'IKT-Sjef' ? 'bg-blue-600 text-white rounded-tl-none' : 'bg-slate-100 text-slate-700 rounded-tr-none border border-slate-200'}`}>
                                                                    {msg.text}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex flex-col h-full shadow-sm">
                                                <div className="mb-6">
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Hvem har vi involvert?</h3>
                                                    <div className="flex flex-wrap gap-2">
                                                        {steps[activeStep].mapping.involvement.split(', ').map((person, pi) => (
                                                            <span key={pi} className="bg-white px-4 py-2 rounded-xl shadow-sm text-[11px] font-black text-slate-600 border border-slate-100 flex items-center">
                                                                👤 {person}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-blue-50 p-5 rounded-2xl border-l-4 border-blue-400 mb-6">
                                                    <h3 className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-widest">Gevinst-mål (Compliance)</h3>
                                                    <p className="text-blue-900 font-bold leading-relaxed">{steps[activeStep].mapping.goal}</p>
                                                </div>

                                                <div className="mt-auto">
                                                    <button onClick={() => setViewMode('business')} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 shadow-lg transition-all active:scale-95">
                                                        Se løsningsforslag →
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}

                                {viewMode === 'business' && (
                                    <motion.div 
                                        key="business" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}
                                        className="bg-white rounded-[2rem] p-8 shadow-md border-2 border-emerald-100 flex-1 flex flex-col"
                                    >
                                        <div className="mb-6">
                                            <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Fase 2: Brukerorientert Løsning</span>
                                            <h2 className="text-3xl font-black text-slate-900 mt-2">{steps[activeStep].title} i praksis</h2>
                                        </div>
                                        
                                        <div className="grid md:grid-cols-2 gap-8 flex-1">
                                            <div className="flex flex-col justify-center">
                                                <p className="text-xl text-slate-700 font-medium leading-relaxed mb-6 italic border-l-4 border-emerald-500 pl-6">
                                                    "{steps[activeStep].business.desc}"
                                                </p>
                                                <div className="flex items-center text-emerald-600 bg-emerald-50 p-4 rounded-2xl font-black text-sm border border-emerald-200">
                                                    <span className="text-2xl mr-3">⚡</span> {steps[activeStep].business.automation}
                                                </div>
                                            </div>
                                            <div className="bg-slate-50 rounded-3xl flex flex-col items-center justify-center p-12 text-9xl shadow-inner relative border border-slate-200">
                                                <div className="absolute top-4 right-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Implementert</div>
                                                {steps[activeStep].icon}
                                                <span className="text-xs font-black text-slate-400 uppercase mt-8 tracking-widest">{steps[activeStep].systems}</span>
                                            </div>
                                        </div>
                                        <div className="mt-8 flex space-x-4">
                                            <button onClick={() => setViewMode('mapping')} className="px-6 py-4 rounded-xl font-black text-xs uppercase text-slate-400 hover:text-slate-600 transition-all">← Tilbake til kartlegging</button>
                                            <button onClick={() => setViewMode('technical')} className="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 shadow-lg transition-all flex items-center justify-center active:scale-95">
                                                ⚙️ Se teknisk arkitektur (for IKT)
                                            </button>
                                        </div>
                                    </motion.div>
                                )}

                                {viewMode === 'technical' && (
                                    <motion.div 
                                        key="technical" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }}
                                        className="bg-slate-900 rounded-[2rem] p-8 shadow-xl border-t-8 border-blue-600 flex-1 flex flex-col relative overflow-hidden"
                                    >
                                        <div className="absolute inset-0 opacity-5 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                        <div className="mb-10 relative z-10">
                                            <span className="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Fase 3: Teknisk Arkitektur</span>
                                            <h2 className="text-3xl font-black text-white mt-2">{steps[activeStep].tech.concept}</h2>
                                        </div>

                                        <div className="flex-1 flex flex-col md:flex-row items-center justify-center space-y-6 md:space-y-0 md:space-x-8 relative z-10">
                                            {steps[activeStep].tech.nodes.map((node, ni) => (
                                                <React.Fragment key={ni}>
                                                    <div className={`p-6 rounded-2xl border-2 shadow-lg w-full md:w-64 text-center transition-all hover:scale-105 ${node.color}`}>
                                                        <div className="text-5xl mb-4">{node.icon}</div>
                                                        <div className="font-black text-sm uppercase mb-1">{node.tool}</div>
                                                        <div className="text-[10px] font-bold opacity-70 uppercase tracking-tighter">{node.action}</div>
                                                    </div>
                                                    {ni < steps[activeStep].tech.nodes.length - 1 && <div className="text-blue-500 text-3xl font-black">➔</div>}
                                                </React.Fragment>
                                            ))}
                                        </div>

                                        <div className="mt-10 flex justify-between items-center relative z-10">
                                            <button onClick={() => setViewMode('business')} className="text-slate-400 font-black text-xs uppercase hover:text-white transition-all">← Tilbake til forretningsverdi</button>
                                            <button 
                                                onClick={() => {
                                                    if (activeStep < steps.length - 1) {
                                                        setActiveStep(activeStep + 1);
                                                        setViewMode('mapping');
                                                    }
                                                }}
                                                className="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 shadow-lg active:scale-95 transition-all"
                                            >
                                                Neste vurdering: {activeStep < steps.length - 1 ? steps[activeStep + 1].title : 'Fullført'} →
                                            </button>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        {/* Høyre side */}
                        <div className="lg:col-span-4 flex flex-col space-y-6">
                            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex-1 flex flex-col h-[400px]">
                                <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-4 flex justify-between items-center border-b pb-3">
                                    REVISJONSLOGG (LIVE)
                                    <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                                </h3>
                                <div className="flex-1 overflow-y-auto space-y-3 thin-scrollbar pr-2 font-mono text-[10px] md:text-xs">
                                    <AnimatePresence>
                                        {auditTrail.map((log, li) => (
                                            <motion.div key={li + log} initial={{ x: 20, opacity: 0 }} animate={{ x: 0, opacity: 1 }} className={`p-3 rounded-xl border-l-4 shadow-sm ${li === 0 ? 'bg-blue-50 border-blue-500 font-bold text-blue-900' : 'bg-slate-50 border-slate-300 text-slate-500'}`}>
                                                <span className="opacity-50 mr-2">[{new Date().toLocaleTimeString()}]</span> {log}
                                            </motion.div>
                                        ))}
                                    </AnimatePresence>
                                </div>
                                <div className="mt-4 pt-4 border-t text-center">
                                    <div className="text-[10px] font-black text-slate-400 uppercase mb-2">Prosess-Modenhet</div>
                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                        <motion.div className="h-full bg-blue-600" animate={{ width: `${((activeStep + 1) / steps.length) * 100}%` }}></motion.div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-800 rounded-3xl p-6 shadow-xl border-b-8 border-blue-600">
                                <h4 className="text-blue-400 font-black text-[10px] uppercase mb-2 tracking-widest">💡 Min Tilnærming</h4>
                                <p className="text-xs font-semibold text-slate-300 leading-relaxed italic">
                                    "Teknologi alene løser ingenting. Ved å kartlegge dagens manuelle smertepunkt for hvert steg, bygger vi løsninger som de ansatte faktisk ser verdien av fra dag én."
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OnboardingApp />);
    </script>
</body>
